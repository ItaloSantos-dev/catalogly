services:
  back:
    container_name: back
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ABACATEPAY_TOKEN=${ABACATEPAY_TOKEN}
      - ABACATEPAY_WEBHOOK_SECRET=${ABACATEPAY_WEBHOOK_SECRET}
      - NF_IO_TOKEN=${NF_IO_TOKEN}
    networks:
      - private_network
    depends_on:
      - database

  ngrok:
    image: ngrok/ngrok:latest
    command: http back:8080
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}

    ports:
      - "4040:4040"
    networks:
      - private_network

  database:
    container_name: database
    image: postgres:16
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1131
      - POSTGRES_DB=catalogly
    ports:
      - "5432:5432"
    networks:
      - private_network
    volumes:
      - database_data:/var/lib/postgresql/data

  minio:
    container_name: storage
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - private_network
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  database_data:

networks:
  private_network:
    driver: bridge