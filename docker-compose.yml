services:
  back:
    container_name: back
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - private_network
    depends_on:
      - database

  database:
    container_name: database
    image: postgres:16
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1131
      - POSTGRES_DB=catalogly
    ports:
      - "5432:5432"
    networks:
      - private_network

  minio:
    container_name: storage
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - private_network
    volumes:
      - minio_data:/data

volumes:
  minio_data:

networks:
  private_network:
    driver: bridge